<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ═══ META TAGS SOCIAIS (Link Preview Premium) ═══ -->
    <title>Diagnóstico de Nutrição de Prova | Protocolo Ignição</title>
    <meta name="description"
        content="7 perguntas situacionais que revelam onde sua nutrição está vazando energia antes e durante a prova. Leva menos de 3 minutos.">
    <meta property="og:title" content="Qual é o seu perfil de corredor? Descubra em 3 minutos.">
    <meta property="og:description"
        content="Diagnóstico gratuito que aponta exatamente onde sua nutrição falha na prova. Protocolo Ignição.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#C01A1A">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        /* ═══ TOKENS ═══ */
        :root {
            --blood: #C01A1A;
            --fire: #FF734A;
            --spark: #D88CEE;
            --asphalt: #0C0C0B;
            --graphite: #131313;
            --smoke: #1A1A1A;
            --iron: #282827;
            --steel: #383836;
            --bone: #F5F3F0;
            --fog: #9A9895;
            --emerald: #2E9968;
            --amber: #E0A53A;
            --grad-action: linear-gradient(to right, #C01A1A 0%, #D43B27 50%, #FF734A 100%);
            --grad-brand: linear-gradient(to right, #C01A1A 0%, #E8442A 35%, #FF734A 55%, #D88CEE 100%);
            --font-d: "Barlow Condensed", system-ui, sans-serif;
            --font-b: "Inter", system-ui, sans-serif;
        }

        /* ═══ RESET ═══ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ═══ MESH GRADIENT ANIMADO ═══ */
        body {
            background-color: var(--iron);
            font-family: var(--font-b);
            color: var(--bone);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        /* Camadas de cor que se movem — simula calor */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
            animation: drift 12s ease-in-out infinite alternate;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: var(--blood);
            top: -150px;
            left: -150px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: var(--fire);
            bottom: -100px;
            right: -100px;
            animation-delay: -6s;
            animation-duration: 15s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(60px, 40px) scale(1.15);
            }
        }

        /* ═══ PROGRESS BAR ═══ */
        .progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--grad-brand);
            transition: width .5s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 0 12px rgba(255, 115, 74, .6);
        }

        /* ═══ CARD COM NOISE TEXTURE ═══ */
        .quiz-wrapper {
            width: 100%;
            max-width: 580px;
            position: relative;
            z-index: 1;
        }

        .card {
            /* Glassmorphism real */
            background: rgba(19, 19, 19, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 44px;
            box-shadow:
                0 32px 64px rgba(0, 0, 0, .5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Camada de ruído (noise) para dar textura ao vidro */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
            z-index: 0;
        }

        .card>* {
            position: relative;
            z-index: 1;
        }

        /* ═══ TIPOGRAFIA ═══ */
        .label {
            font-family: var(--font-d);
            font-size: .85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--fire);
            display: block;
            margin-bottom: 10px;
        }

        h1 {
            font-family: var(--font-d);
            font-size: clamp(1.4rem, 3.5vw, 1.8rem);
            font-weight: 700;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 32px;
        }

        /* ═══ OPÇÕES COM STAGGER ═══ */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: rgba(26, 26, 26, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 15px 20px;
            border-radius: 10px;
            color: var(--fog);
            text-align: left;
            cursor: pointer;
            font-family: var(--font-b);
            font-size: .93rem;
            line-height: 1.5;
            transition: all .22s ease;

            /* Stagger — JS vai remover a classe .hidden com delay */
            opacity: 0;
            transform: translateY(12px);
        }

        .option-btn.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity .35s ease, transform .35s ease,
                background .2s ease, border-color .2s ease, color .2s ease;
        }

        .option-btn:hover {
            background: rgba(192, 26, 26, 0.1);
            border-color: rgba(192, 26, 26, 0.45);
            color: var(--bone);
            transform: translateX(5px) !important;
        }

        .option-btn:active {
            transform: scale(0.98) !important;
        }

        /* Feedback visual ao clicar */
        .option-btn.selected {
            background: rgba(192, 26, 26, 0.18) !important;
            border-color: rgba(192, 26, 26, 0.6) !important;
            color: var(--bone) !important;
            pointer-events: none;
        }

        /* ═══ FADE DE TROCA DE PERGUNTA ═══ */
        .card.out {
            animation: slideOut .28s ease forwards;
        }

        .card.in {
            animation: slideIn .38s ease forwards;
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: scale(.97) translateY(-8px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(.97) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ═══ BADGES DE RESULTADO ═══ */
        .badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 999px;
            font-family: var(--font-d);
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .badge-red {
            background: rgba(192, 26, 26, .12);
            color: #E53535;
            border: 1px solid rgba(192, 26, 26, .45);
        }

        .badge-amber {
            background: rgba(224, 165, 58, .12);
            color: var(--amber);
            border: 1px solid var(--amber);
        }

        .badge-green {
            background: rgba(46, 153, 104, .12);
            color: var(--emerald);
            border: 1px solid var(--emerald);
        }

        .result-text {
            color: var(--fog);
            font-size: .95rem;
            line-height: 1.6;
            margin: 18px 0;
        }

        /* ═══ DIVISOR COM GRADIENTE ═══ */
        .divider {
            height: 1px;
            margin: 28px 0;
            background: linear-gradient(to right, transparent, rgba(255, 115, 74, .3), transparent);
        }

        /* ═══ CTA BUTTON COM PULSE ═══ */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(192, 26, 26, .7);
            }

            70% {
                box-shadow: 0 0 0 14px rgba(192, 26, 26, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(192, 26, 26, 0);
            }
        }

        .cta-btn {
            display: block;
            width: 100%;
            background: var(--grad-action);
            color: #fff;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 10px;
            font-family: var(--font-d);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 1px;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: opacity .25s, transform .25s;
            animation: pulse 2.5s infinite;
        }

        .cta-btn:hover {
            opacity: .92;
            transform: translateY(-2px);
            animation-play-state: paused;
        }

        /* ═══ TELA RESULTADO OCULTA ═══ */
        #result-card {
            display: none;
        }

        /* ═══ CANVAS PARA CONFETES (BLINDADO) ═══ */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            width: 100%;
            height: 100%;
        }

        /* ═══ MOBILE ═══ */
        @media (max-width:480px) {
            .card {
                padding: 24px 16px;
            }

            h1 {
                font-size: 1.35rem;
                margin-bottom: 24px;
            }

            .result-text {
                font-size: .88rem;
                line-height: 1.5;
                margin: 14px 0;
            }

            .cta-btn {
                font-size: 1rem;
                padding: 16px 12px;
                line-height: 1.3;
            }
        }

        /* ═══ ACESSIBILIDADE E UX PRO MAX ═══ */
        .option-btn:focus-visible,
        .cta-btn:focus-visible {
            outline: 2px solid var(--fire);
            outline-offset: 4px;
        }

        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            ::before,
            ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ═══ ANIMAÇÃO DE FOGO ARDENDO ═══ */
        @keyframes flame-flicker {

            0%,
            100% {
                transform: scale(1) translateY(0) rotate(-1deg);
                opacity: 0.8;
            }

            25% {
                transform: scale(1.05) translateY(-2px) rotate(1deg);
                opacity: 1;
            }

            50% {
                transform: scale(0.95) translateY(0) rotate(-2deg);
                opacity: 0.9;
            }

            75% {
                transform: scale(1.08) translateY(-1px) rotate(2deg);
                opacity: 1;
            }
        }

        @keyframes flame-glow {

            0%,
            100% {
                filter: drop-shadow(0 0 2px var(--blood)) drop-shadow(0 0 5px var(--fire));
            }

            50% {
                filter: drop-shadow(0 0 4px var(--blood)) drop-shadow(0 0 12px var(--fire));
            }
        }

        .flame-icon {
            animation: flame-glow 2s infinite ease-in-out;
            display: inline-block;
            overflow: visible;
        }

        .flame-part {
            transform-origin: bottom center;
            animation: flame-flicker 1.5s infinite ease-in-out;
        }

        .flame-part-1 {
            animation-delay: 0s;
            fill: var(--blood);
            opacity: 0.9;
        }

        .flame-part-2 {
            animation-delay: 0.3s;
            fill: var(--fire);
            opacity: 0.95;
        }

        .flame-part-3 {
            animation-delay: 0.6s;
            fill: var(--amber);
            opacity: 1;
        }
    </style>
</head>

<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="quiz-wrapper">

        <!-- PERGUNTA -->
        <div id="quiz-card" class="card">
            <span class="label" id="questionLabel">PERGUNTA 01 / 07</span>
            <h1 id="questionText"></h1>
            <div class="options-list" id="optionsContainer"></div>
        </div>

        <!-- RESULTADO -->
        <div id="result-card" class="card">
            <span class="label">Seu Diagnóstico</span>
            <div id="resultBadge" class="badge"></div>
            <h1 id="resultTitle"></h1>
            <div class="divider"></div>
            <p id="resultText" class="result-text"></p>
            <a href="https://wa.me/SEUNUMERO?text=Quero+conhecer+o+Protocolo+Igni%C3%A7%C3%A3o" class="cta-btn"
                id="ctaBtn">
                <svg class="flame-icon" width="30" height="30" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <!-- Camada Externa -->
                    <path class="flame-part flame-part-1"
                        d="M12 22C16.4183 22 20 18.4183 20 14C20 9.58172 12 2 12 2C12 2 4 9.58172 4 14C4 18.4183 7.58172 22 12 22Z" />
                    <!-- Camada Média -->
                    <path class="flame-part flame-part-2"
                        d="M12 20C14.2091 20 16 18.2091 16 16C16 13.7909 12 6 12 6C12 6 8 13.7909 8 16C8 18.2091 9.79086 20 12 20Z" />
                    <!-- Núcleo -->
                    <path class="flame-part flame-part-3"
                        d="M12 18C13.1046 18 14 17.1046 14 16C14 14.8954 12 10 12 10C12 10 10 14.8954 10 16C10 17.1046 10.8954 18 12 18Z" />
                </svg>
                QUERO AJUSTAR MINHA ESTRATÉGIA ANTES DA PRÓXIMA PROVA
            </a>
        </div>

    </div>

    <script>
        /* ═══════════════════════════════════════════════
           DADOS DO QUIZ
        ═══════════════════════════════════════════════ */
        const questions = [
            {
                q: "Você acorda 2h antes da prova. Qual dessas decisões pode estar sabotando sua energia logo na largada?",
                options: [
                    { text: "Como uma refeição completa logo ao acordar para garantir energia.", pts: 0 },
                    { text: "Tomo só um café, talvez uma fruta. Não gosto de correr cheio.", pts: 1 },
                    { text: "Como algo leve, de fácil digestão, e respeito o tempo até a largada.", pts: 2 },
                    { text: "Não como nada. Prefiro largar com o estômago vazio.", pts: 0 }
                ]
            },
            {
                q: "Você está bem no meio da prova. É exatamente aqui que muita gente erra. Quando você decide tomar o próximo gel?",
                options: [
                    { text: "Agora, antes do corpo começar a cobrar.", pts: 2 },
                    { text: "Quando começo a sentir o cansaço chegando.", pts: 1 },
                    { text: "Só se sentir que preciso. Não gosto de depender disso.", pts: 0 },
                    { text: "Espero até o final pra não enjoar.", pts: 0 }
                ]
            },
            {
                q: "Um amigo te indica um gel de cafeína que “sempre funciona”. O erro de muita gente começa aqui. O que você faz?",
                options: [
                    { text: "Uso direto na prova. Se funciona pra ele, deve funcionar pra mim.", pts: 0 },
                    { text: "Pesquiso sobre, vejo os ingredientes e decido.", pts: 0 },
                    { text: "Testo em um treino curto pra ver como me sinto.", pts: 1 },
                    { text: "Testo em treinos longos, simulando exatamente o ritmo da prova.", pts: 2 }
                ]
            },
            {
                q: "Se sua perna trava nos quilômetros finais, qual desses erros você provavelmente cometeu antes, mesmo sem perceber?",
                options: [
                    { text: "Treinei menos do que deveria.", pts: 0 },
                    { text: "Saí rápido demais e gastei energia cedo.", pts: 1 },
                    { text: "Errei na reposição de carboidrato ou deixei pra tarde demais.", pts: 2 },
                    { text: "Me hidratei mal durante a prova.", pts: 0 }
                ]
            },
            {
                q: "Em treinos longos, a hidratação errada não aparece na hora, ela cobra depois. Como você normalmente faz?",
                options: [
                    { text: "Bebo quando sinto sede.", pts: 0 },
                    { text: "Bebo em todos os postos, independente de como estou.", pts: 1 },
                    { text: "Sigo um padrão com água + reposição de sódio ao longo do tempo.", pts: 2 },
                    { text: "Alterno água e isotônico achando que isso resolve tudo.", pts: 1 }
                ]
            },
            {
                q: "Faltam 20 minutos para um treino de 10km. Pequenas decisões aqui fazem mais diferença do que parecem. O que você faz?",
                options: [
                    { text: "Não como nada. É uma distância curta.", pts: 0 },
                    { text: "Como algo mais completo, tipo fruta com suco.", pts: 0 },
                    { text: "Como uma pequena fonte rápida de energia, fácil de digerir.", pts: 2 },
                    { text: "Como uma barrinha leve só pra não ir em jejum.", pts: 0 }
                ]
            },
            {
                q: "Sexta à noite antes da prova. É aqui que muita gente acha que está acertando e já começou errando. O que você janta?",
                options: [
                    { text: "Macarrão com molho. É o clássico pré-prova.", pts: 1 },
                    { text: "Algo leve e proteico, pra não pesar.", pts: 0 },
                    { text: "Carboidrato simples, controlando gordura e fibra.", pts: 2 },
                    { text: "Como normal. Ainda tem sábado.", pts: 0 }
                ]
            }
        ];

        const results = [
            {
                range: [0, 4], badgeClass: "badge-red",
                badge: "Perfil: No Chute",
                title: "Você corre na base da esperança.",
                text: "E a esperança acaba quando a prova começa de verdade.<br><br>Sua nutrição depende do improviso: você come o que dá e ajusta na hora. Esse erro aparece quando sua perna trava e não dá mais tempo de corrigir.<br><br>O Protocolo Ignição tira você do improviso e constrói uma estratégia real, testada e pronta para o dia da prova."
            },
            {
                range: [5, 9], badgeClass: "badge-amber",
                badge: "Perfil: Quase Lá",
                title: "Você está perto, mas falta precisão.",
                text: "Seus erros não são óbvios. São detalhes: timing de gel ou estratégia de véspera mal ajustada.<br><br>Isso passa despercebido no treino, mas aparece quando a prova exige mais. Você sente que fez tudo certo, mas o resultado não vem.<br><br>O Protocolo Ignição identifica esses pontos cegos e ajusta um por um. Melhorar pouco no seu caso já muda muito."
            },
            {
                range: [10, 14], badgeClass: "badge-green",
                badge: "Perfil: Blindado",
                title: "Você é elite, mas ainda não tem o controle total.",
                text: "Você faz o básico bem, mas no alto nível, o detalhe te derruba. Saber que precisa de carboidrato é o básico. Saber exatamente quanto e quando no seu ritmo é o diferencial.<br><br>O Protocolo Ignição é sobre ajuste fino milimétrico e personalizado para o seu contexto.<br><br>Consistência em prova vem do que você executa sem erro."
            }
        ];

        /* ═══════════════════════════════════════════════
           ESTADO
        ═══════════════════════════════════════════════ */
        let step = 0, score = 0;

        const progressBar = document.getElementById('progressBar');
        const quizCard = document.getElementById('quiz-card');
        const resultCard = document.getElementById('result-card');
        const questionLabel = document.getElementById('questionLabel');
        const questionText = document.getElementById('questionText');
        const optionsEl = document.getElementById('optionsContainer');

        /* ═══════════════════════════════════════════════
           RENDER PERGUNTA
        ═══════════════════════════════════════════════ */
        function render() {
            const q = questions[step];
            progressBar.style.width = `${(step / questions.length) * 100}%`;
            questionLabel.textContent = `PERGUNTA ${step + 1} / ${questions.length}`;
            questionText.textContent = q.q;

            optionsEl.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.addEventListener('click', () => pick(btn, opt.pts));
                optionsEl.appendChild(btn);

                // Stagger de entrada
                setTimeout(() => btn.classList.add('visible'), 60 + i * 80);
            });
        }

        /* ═══════════════════════════════════════════════
           FUNÇÃO DE LOADING (PSICOLÓGICO)
        ═══════════════════════════════════════════════ */
        function showLoading() {
            questionLabel.textContent = 'Analisando...';
            questionText.textContent = 'Identificando o padrão de erro na sua estratégia...';
            
            // Injeta a barra de progresso animada
            optionsEl.innerHTML = `
                <div style="margin-top: 40px; display: flex; flex-direction: column; gap: 12px;">
                    <div style="display: flex; justify-content: space-between; font-family: var(--font-d); font-size: 1.1rem; color: var(--fog); letter-spacing: 1px; text-transform: uppercase;">
                        <span>Processando dados</span>
                        <span id="loadingPercent" style="color: var(--fire); font-weight: 700;">0%</span>
                    </div>
                    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);">
                        <div id="loadingBar" style="height: 100%; width: 0%; background: var(--grad-brand); border-radius: 4px; box-shadow: 0 0 10px rgba(255, 115, 74, 0.8);"></div>
                    </div>
                </div>
            `;

            const percentEl = document.getElementById('loadingPercent');
            const barEl = document.getElementById('loadingBar');
            
            let startTime = null;
            const duration = 1500;

            function animateLoading(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                
                let progress = 0;
                if (elapsed <= 500) {
                    // 0 a 50% em 0.5s (linear ou ease-in nessa fase)
                    progress = (elapsed / 500) * 0.5;
                } else {
                    // 50% a 100% nos 1000ms restantes
                    const remainingElapsed = elapsed - 500;
                    progress = 0.5 + (remainingElapsed / 1000) * 0.5;
                }
                
                const percent = Math.floor(Math.min(progress, 1) * 100);
                
                percentEl.textContent = percent + '%';
                barEl.style.width = percent + '%';
                
                if (elapsed < duration) {
                    requestAnimationFrame(animateLoading);
                }
            }
            
            requestAnimationFrame(animateLoading);
        }

        /* ═══════════════════════════════════════════════
           SELEÇÃO DE RESPOSTA
        ═══════════════════════════════════════════════ */
        function pick(btn, pts) {
            // Limpa as opções imediatamente para evitar pré-marcação visual na próxima tela
            const allBtns = optionsEl.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.classList.remove('selected'));
            
            // Vibração (Android/Chrome)
            if (navigator.vibrate) navigator.vibrate(40);

            // Feedback visual
            btn.classList.add('selected');

            score += pts;
            step++;

            // Pausa para o usuário ver o feedback antes de trocar
            setTimeout(() => {
                if (step < questions.length) {
                    transition(render);
                } else {
                    transition(showLoading);
                    setTimeout(() => {
                        transition(showResult);
                    }, 1500);
                }
            }, 320);
        }

        /* ═══════════════════════════════════════════════
           TRANSIÇÃO ENTRE TELAS
        ═══════════════════════════════════════════════ */
        function transition(callback) {
            quizCard.classList.add('out');
            setTimeout(() => {
                callback();
                quizCard.classList.remove('out');
                quizCard.classList.add('in');
                setTimeout(() => quizCard.classList.remove('in'), 400);
            }, 280);
        }

        /* ═══════════════════════════════════════════════
           RESULTADO
        ═══════════════════════════════════════════════ */
        function showResult() {
            progressBar.style.width = '100%';
            quizCard.style.display = 'none';
            resultCard.style.display = 'block';

            const r = results.find(r => score >= r.range[0] && score <= r.range[1]);

            document.getElementById('resultBadge').className = `badge ${r.badgeClass}`;
            document.getElementById('resultBadge').textContent = r.badge;
            document.getElementById('resultTitle').textContent = r.title;
            document.getElementById('resultText').innerHTML = r.text;

            // Confetes de Brasas para quem é BLINDADO
            if (score >= 10) launchEmbers();
        }

        /* ═══════════════════════════════════════════════
           CONFETES / BRASAS (Canvas)
        ═══════════════════════════════════════════════ */
        function launchEmbers() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const colors = ['#C01A1A', '#FF734A', '#FFB347', '#D88CEE', '#FF6B6B'];
            const particles = Array.from({ length: 80 }, () => ({
                x: Math.random() * canvas.width,
                y: canvas.height + 10,
                vx: (Math.random() - 0.5) * 3,
                vy: -(Math.random() * 5 + 3),
                size: Math.random() * 5 + 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                life: 1, decay: Math.random() * 0.012 + 0.006,
                rotate: Math.random() * 360, rotateV: (Math.random() - 0.5) * 5
            }));

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.08;
                    p.life -= p.decay; p.rotate += p.rotateV;
                    if (p.life <= 0) return;
                    alive = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotate * Math.PI / 180);
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.4);
                    ctx.restore();
                });
                if (alive) requestAnimationFrame(draw);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            draw();
        }

        /* ═══════════════════════════════════════════════
           INIT
        ═══════════════════════════════════════════════ */
        render();
    </script>
</body>
